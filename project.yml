name: GravityFlip
options:
  bundleIdPrefix: com.gravityflip
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

targets:
  GravityFlip:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GravityFlip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gravityflip.game
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: GravityFlip/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: "NO"
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: GameKit.framework
      - sdk: StoreKit.framework
      - sdk: AppTrackingTransparency.framework
      - package: GoogleMobileAds
        product: GoogleMobileAds
    info:
      path: GravityFlip/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        SKDefaultSceneName: ""
        # AdMob test app ID — replace with real ID before shipping
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        NSUserTrackingUsageDescription: "We use your device identifier to show you personalised ads. You can opt out at any time in Settings."
